<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Title Gradient Template</title>
  <style>
    /* ===== Design System (inline for single-file) ===== */
    :root {
      --color-primary: #0652DD;
      --color-primary-light: #E8EEFF;
      --color-primary-dark: #003BB5;
      --color-accent: #FF4757;
      --color-accent-light: #FFE8EA;
      --color-bg: #FFFFFF;
      --color-bg-subtle: #F8F9FA;
      --color-text: #1A1A1A;
      --color-text-muted: #6B7280;
      --color-border: #E5E7EB;
      --font-heading: "Noto Sans JP", "Helvetica Neue", Arial, system-ui, sans-serif;
      --font-body: "Noto Sans JP", "Helvetica Neue", Arial, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
      --slide-width: 1920px;
      --slide-height: 1080px;
      --slide-padding: 120px;
      --slide-padding-top: 100px;
      --space-xs: 8px;
      --space-sm: 16px;
      --space-md: 24px;
      --space-lg: 40px;
      --space-xl: 64px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-pill: 999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow: hidden; width: 100%; height: 100%; background: #000; }

    .slides-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .slide {
      width: var(--slide-width);
      height: var(--slide-height);
      position: absolute;
      top: 0;
      left: 0;
      background: var(--color-bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      transform-origin: top left;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--color-text);
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 1;
    }

    /* ===== Title Slide Layout ===== */
    .slide--title {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 120px 140px;
      /* No side label — eliminated to prevent collision (v2 fix) */
    }

    .title-logo {
      position: absolute;
      top: 48px;
      left: 140px;
      height: 40px;
    }

    .title-logo svg {
      height: 40px;
      width: auto;
    }

    .title-main {
      font-family: var(--font-heading);
      font-size: 56px;
      font-weight: 800;
      color: var(--color-text);
      line-height: 1.35;
      margin-bottom: var(--space-md);
      max-width: 960px;
      /* max ~30 chars for single line, ~60 chars for 2 lines */
    }

    .title-sub {
      font-family: var(--font-body);
      font-size: 24px;
      font-weight: 400;
      color: var(--color-text-muted);
      line-height: 1.6;
      max-width: 800px;
      /* max ~60 chars */
    }

    .title-date {
      font-family: var(--font-body);
      font-size: 18px;
      font-weight: 400;
      color: var(--color-text-muted);
      margin-top: var(--space-lg);
    }

    /* Gradient Art — positioned to never overlap text content */
    .gradient-art {
      position: absolute;
      bottom: -100px;
      right: -200px;
      width: 900px;
      height: 600px;
      background:
        radial-gradient(ellipse at 30% 60%, rgba(255, 71, 87, 0.6) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 40%, rgba(6, 82, 221, 0.8) 0%, transparent 50%),
        linear-gradient(135deg, #0652DD 0%, #3B9AFF 50%, #FF4757 100%);
      filter: blur(30px) saturate(1.2);
      transform: rotate(-15deg);
      clip-path: polygon(30% 0%, 100% 0%, 100% 100%, 0% 100%);
      opacity: 0.9;
      pointer-events: none;
    }

    /* ===== Navigation ===== */
    .slide-nav {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 100;
      background: rgba(0,0,0,0.6);
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .slide-nav:hover { opacity: 1; }
    .slide-nav button {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
    }
    .slide-nav button:hover { background: rgba(255,255,255,0.2); }
    .slide-counter { color: white; font-size: 14px; font-family: var(--font-mono); }

    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(0,0,0,0.1);
      z-index: 100;
    }
    .progress-bar__fill {
      height: 100%;
      background: var(--color-primary);
      transition: width 0.3s ease;
      width: 0%;
    }

    @media print {
      .slide-nav, .progress-bar { display: none !important; }
      body { background: white; }
      .slides-container { display: block; overflow: visible; }
      .slide {
        position: relative !important;
        opacity: 1 !important;
        transform: none !important;
        pointer-events: auto;
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        page-break-after: always;
      }
      @page { size: 1920px 1080px; margin: 0; }
    }
  </style>
</head>
<body>
  <nav class="slide-nav">
    <span class="slide-counter"><span id="current">1</span> / <span id="total">1</span></span>
    <button onclick="prevSlide()" aria-label="Previous">&#8249;</button>
    <button onclick="nextSlide()" aria-label="Next">&#8250;</button>
    <button onclick="toggleFullscreen()" aria-label="Fullscreen">&#x26F6;</button>
  </nav>

  <div class="progress-bar"><div class="progress-bar__fill" id="progress"></div></div>

  <div class="slides-container">

    <!-- ===== SLIDE: Title with Gradient Art ===== -->
    <section class="slide slide--title active" id="slide-1">

      <!-- Logo placeholder (replace with actual SVG or remove) -->
      <div class="title-logo">
        <svg viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="8" fill="#0652DD"/>
          <text x="52" y="28" font-family="system-ui" font-size="22" font-weight="700" fill="#1A1A1A">Company</text>
        </svg>
      </div>

      <!-- Title: max 30 chars single-line / 60 chars 2-line -->
      <h1 class="title-main">FY2026.6 1Q<br>決算説明資料</h1>

      <!-- Subtitle: max 60 chars -->
      <p class="title-sub">2026年3月期 第1四半期 決算説明</p>

      <!-- Date -->
      <p class="title-date">2026年3月19日</p>

      <!-- Gradient art decoration -->
      <div class="gradient-art"></div>

    </section>

  </div>

  <script>
    /* ===== Navigation ===== */
    (function() {
      var slides = document.querySelectorAll('.slide');
      var total = slides.length;
      var current = 0;
      var currentEl = document.getElementById('current');
      var totalEl = document.getElementById('total');
      var progressEl = document.getElementById('progress');
      if (totalEl) totalEl.textContent = total;

      function goTo(index) {
        if (index < 0 || index >= total) return;
        slides[current].classList.remove('active');
        current = index;
        slides[current].classList.add('active');
        if (currentEl) currentEl.textContent = current + 1;
        if (progressEl) progressEl.style.width = ((current + 1) / total * 100) + '%';
        history.replaceState(null, '', '#' + (current + 1));
      }
      function next() { goTo(current + 1); }
      function prev() { goTo(current - 1); }

      document.addEventListener('keydown', function(e) {
        switch(e.key) {
          case 'ArrowRight': case 'ArrowDown': case ' ': case 'PageDown':
            e.preventDefault(); next(); break;
          case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
            e.preventDefault(); prev(); break;
          case 'Home': goTo(0); break;
          case 'End': goTo(total - 1); break;
          case 'f': case 'F':
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
            break;
        }
      });

      var touchStartX = 0;
      document.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; });
      document.addEventListener('touchend', function(e) {
        var diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 50) { diff > 0 ? next() : prev(); }
      });

      var wheelCooldown = false;
      document.addEventListener('wheel', function(e) {
        if (wheelCooldown) return;
        wheelCooldown = true;
        setTimeout(function() { wheelCooldown = false; }, 500);
        e.deltaY > 0 ? next() : prev();
      });

      function updateScale() {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var scale = Math.min(vw / 1920, vh / 1080);
        var offsetX = (vw - 1920 * scale) / 2;
        var offsetY = (vh - 1080 * scale) / 2;
        slides.forEach(function(s) {
          s.style.transform = 'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + scale + ')';
        });
      }

      window.addEventListener('load', function() {
        var hash = parseInt(location.hash.slice(1));
        goTo(isNaN(hash) ? 0 : hash - 1);
        updateScale();
      });
      window.addEventListener('resize', updateScale);
      window.prevSlide = prev;
      window.nextSlide = next;
      window.toggleFullscreen = function() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      };
    })();
  </script>
</body>
</html>
