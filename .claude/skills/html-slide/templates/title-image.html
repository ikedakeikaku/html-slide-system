<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Title Image Template</title>
  <style>
    :root {
      --color-primary: #0652DD;
      --color-primary-light: #E8EEFF;
      --color-primary-dark: #003BB5;
      --color-accent: #FF4757;
      --color-accent-light: #FFE8EA;
      --color-bg: #FFFFFF;
      --color-bg-subtle: #F8F9FA;
      --color-text: #1A1A1A;
      --color-text-muted: #6B7280;
      --color-border: #E5E7EB;
      --font-heading: "Noto Sans JP", "Helvetica Neue", Arial, system-ui, sans-serif;
      --font-body: "Noto Sans JP", "Helvetica Neue", Arial, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
      --slide-width: 1920px;
      --slide-height: 1080px;
      --slide-padding: 120px;
      --slide-padding-top: 100px;
      --space-xs: 8px;
      --space-sm: 16px;
      --space-md: 24px;
      --space-lg: 40px;
      --space-xl: 64px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-pill: 999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow: hidden; width: 100%; height: 100%; background: #000; }

    .slides-container {
      width: 100vw; height: 100vh; overflow: hidden; position: relative;
    }

    .slide {
      width: var(--slide-width);
      height: var(--slide-height);
      position: absolute; top: 0; left: 0;
      background: var(--color-bg);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      transform-origin: top left;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--color-text);
    }
    .slide.active { opacity: 1; pointer-events: auto; z-index: 1; }

    /* ===== Title Image Layout ===== */
    .slide--title-image {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 120px 140px;
      position: relative;
    }

    /* Background image placeholder using CSS gradient pattern */
    .title-image-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a1a2e 100%),
        repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 80px);
      background-blend-mode: overlay;
    }

    /* Dark gradient overlay on right side for text readability */
    .title-image-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(
        to right,
        rgba(15, 23, 42, 0.95) 0%,
        rgba(15, 23, 42, 0.88) 45%,
        rgba(15, 23, 42, 0.4) 75%,
        rgba(15, 23, 42, 0.15) 100%
      );
    }

    .title-image-logo {
      position: absolute;
      top: 48px;
      left: 140px;
      height: 40px;
      z-index: 2;
    }

    .title-image-logo svg {
      height: 40px;
      width: auto;
    }

    .title-image-content {
      position: relative;
      z-index: 2;
      max-width: 960px;
    }

    .title-image-main {
      font-family: var(--font-heading);
      font-size: 56px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.35;
      margin-bottom: var(--space-md);
    }

    .title-image-sub {
      font-family: var(--font-body);
      font-size: 24px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.6;
      max-width: 800px;
    }

    .title-image-date {
      font-family: var(--font-body);
      font-size: 18px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      margin-top: var(--space-lg);
    }

    /* Decorative accent line */
    .title-image-accent {
      width: 80px;
      height: 4px;
      background: var(--color-primary);
      border-radius: 2px;
      margin-bottom: var(--space-lg);
    }

    /* ===== Navigation ===== */
    .slide-nav {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; align-items: center; gap: 8px; z-index: 100;
      background: rgba(0,0,0,0.6); padding: 8px 16px;
      border-radius: var(--radius-pill); opacity: 0; transition: opacity 0.3s;
    }
    .slide-nav:hover { opacity: 1; }
    .slide-nav button {
      background: none; border: none; color: white;
      font-size: 20px; cursor: pointer; padding: 4px 8px;
    }
    .slide-nav button:hover { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .slide-counter { color: white; font-size: 14px; font-family: var(--font-mono); }

    .progress-bar {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 4px;
      background: rgba(0,0,0,0.1); z-index: 100;
    }
    .progress-bar__fill { height: 100%; background: var(--color-primary); transition: width 0.3s ease; width: 0%; }

    @media print {
      .slide-nav, .progress-bar { display: none !important; }
      body { background: white; }
      .slides-container { display: block; overflow: visible; }
      .slide {
        position: relative !important; opacity: 1 !important;
        transform: none !important; pointer-events: auto;
        width: 100%; height: auto; aspect-ratio: 16 / 9; page-break-after: always;
      }
      @page { size: 1920px 1080px; margin: 0; }
    }
  </style>
</head>
<body>
  <nav class="slide-nav">
    <span class="slide-counter"><span id="current">1</span> / <span id="total">1</span></span>
    <button onclick="prevSlide()" aria-label="Previous">&#8249;</button>
    <button onclick="nextSlide()" aria-label="Next">&#8250;</button>
    <button onclick="toggleFullscreen()" aria-label="Fullscreen">&#x26F6;</button>
  </nav>
  <div class="progress-bar"><div class="progress-bar__fill" id="progress"></div></div>

  <div class="slides-container">

    <!-- ===== SLIDE: Title with Background Image ===== -->
    <section class="slide slide--title-image active" id="slide-1">

      <!-- Background image placeholder (CSS gradient pattern) -->
      <div class="title-image-bg"></div>

      <!-- Dark overlay for text readability -->
      <div class="title-image-overlay"></div>

      <!-- Logo placeholder -->
      <div class="title-image-logo">
        <svg viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="8" fill="#0652DD"/>
          <text x="52" y="28" font-family="system-ui" font-size="22" font-weight="700" fill="#FFFFFF">Company</text>
        </svg>
      </div>

      <div class="title-image-content">
        <div class="title-image-accent"></div>
        <h1 class="title-image-main">デジタル変革による<br>事業成長戦略</h1>
        <p class="title-image-sub">中期経営計画 2026-2028 説明資料</p>
        <p class="title-image-date">2026年3月19日</p>
      </div>

    </section>

  </div>

  <script>
    (function() {
      var slides = document.querySelectorAll('.slide');
      var total = slides.length;
      var current = 0;
      var currentEl = document.getElementById('current');
      var totalEl = document.getElementById('total');
      var progressEl = document.getElementById('progress');
      if (totalEl) totalEl.textContent = total;

      function goTo(index) {
        if (index < 0 || index >= total) return;
        slides[current].classList.remove('active');
        current = index;
        slides[current].classList.add('active');
        if (currentEl) currentEl.textContent = current + 1;
        if (progressEl) progressEl.style.width = ((current + 1) / total * 100) + '%';
        history.replaceState(null, '', '#' + (current + 1));
      }
      function next() { goTo(current + 1); }
      function prev() { goTo(current - 1); }

      document.addEventListener('keydown', function(e) {
        switch(e.key) {
          case 'ArrowRight': case 'ArrowDown': case ' ': case 'PageDown':
            e.preventDefault(); next(); break;
          case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
            e.preventDefault(); prev(); break;
          case 'Home': goTo(0); break;
          case 'End': goTo(total - 1); break;
        }
      });

      var touchStartX = 0;
      document.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; });
      document.addEventListener('touchend', function(e) {
        var diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 50) { diff > 0 ? next() : prev(); }
      });

      var wheelCooldown = false;
      document.addEventListener('wheel', function(e) {
        if (wheelCooldown) return;
        wheelCooldown = true;
        setTimeout(function() { wheelCooldown = false; }, 500);
        e.deltaY > 0 ? next() : prev();
      });

      function updateScale() {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var scale = Math.min(vw / 1920, vh / 1080);
        var offsetX = (vw - 1920 * scale) / 2;
        var offsetY = (vh - 1080 * scale) / 2;
        slides.forEach(function(s) {
          s.style.transform = 'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + scale + ')';
        });
      }

      window.addEventListener('load', function() {
        var hash = parseInt(location.hash.slice(1));
        goTo(isNaN(hash) ? 0 : hash - 1);
        updateScale();
      });
      window.addEventListener('resize', updateScale);
      window.prevSlide = prev;
      window.nextSlide = next;
      window.toggleFullscreen = function() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      };
    })();
  </script>
</body>
</html>
