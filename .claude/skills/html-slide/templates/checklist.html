<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist Template</title>
  <style>
    :root {
      --color-primary: #0652DD; --color-primary-light: #E8EEFF; --color-primary-dark: #003BB5;
      --color-accent: #FF4757; --color-accent-light: #FFE8EA;
      --color-bg: #FFFFFF; --color-bg-subtle: #F8F9FA;
      --color-text: #1A1A1A; --color-text-muted: #6B7280; --color-border: #E5E7EB;
      --font-heading: "Noto Sans JP", "Helvetica Neue", Arial, system-ui, sans-serif;
      --font-body: "Noto Sans JP", "Helvetica Neue", Arial, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
      --slide-width: 1920px; --slide-height: 1080px; --slide-padding: 120px; --slide-padding-top: 100px;
      --space-xs: 8px; --space-sm: 16px; --space-md: 24px; --space-lg: 40px; --space-xl: 64px;
      --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px; --radius-pill: 999px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow: hidden; width: 100%; height: 100%; background: #000; }
    .slides-container { width: 100vw; height: 100vh; overflow: hidden; position: relative; }
    .slide { width: var(--slide-width); height: var(--slide-height); padding: var(--slide-padding-top) var(--slide-padding) var(--slide-padding); position: absolute; top: 0; left: 0; background: var(--color-bg); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; transform-origin: top left; overflow: hidden; font-family: var(--font-body); color: var(--color-text); }
    .slide.active { opacity: 1; pointer-events: auto; z-index: 1; }

    .slide-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-lg); }
    .slide-header__left { display: flex; align-items: center; gap: var(--space-sm); }
    .section-badge { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: var(--color-primary); color: white; font-weight: 700; font-size: 20px; border-radius: var(--radius-sm); flex-shrink: 0; }
    .slide-title { font-family: var(--font-heading); font-size: 36px; font-weight: 800; color: var(--color-text); line-height: 1.3; }

    /* ===== Checklist Layout ===== */
    .checklist-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 48px;
    }

    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px 24px;
      background: var(--color-bg-subtle);
      border-radius: var(--radius-md);
      border-left: 4px solid var(--color-primary);
    }

    .checklist-item--done {
      border-left-color: #22C55E;
    }

    .checklist-check {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .checklist-check--done {
      background: #22C55E;
      color: white;
    }

    .checklist-check--todo {
      background: white;
      border: 2px solid var(--color-border);
    }

    .checklist-check svg { width: 18px; height: 18px; }

    .checklist-content__title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .checklist-content__desc {
      font-size: 14px;
      color: var(--color-text-muted);
      line-height: 1.5;
    }

    .checklist-summary {
      margin-top: 32px;
      padding: 20px 28px;
      background: var(--color-primary-light);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .checklist-summary svg { width: 40px; height: 40px; flex-shrink: 0; }

    .checklist-summary__text {
      font-size: 17px;
      line-height: 1.6;
    }

    .slide-footer { position: absolute; bottom: 36px; left: var(--slide-padding); right: var(--slide-padding); display: flex; justify-content: space-between; align-items: flex-end; }
    .slide-footer__notes { font-size: 11px; color: var(--color-text-muted); max-width: 80%; line-height: 1.5; }
    .slide-footer__page { font-size: 14px; color: var(--color-text-muted); }

    .slide-nav { position: fixed; bottom: 20px; right: 20px; display: flex; align-items: center; gap: 8px; z-index: 100; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: var(--radius-pill); opacity: 0; transition: opacity 0.3s; }
    .slide-nav:hover { opacity: 1; }
    .slide-nav button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 4px 8px; }
    .slide-counter { color: white; font-size: 14px; font-family: var(--font-mono); }
    .progress-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(0,0,0,0.1); z-index: 100; }
    .progress-bar__fill { height: 100%; background: var(--color-primary); transition: width 0.3s ease; width: 0%; }

    @media print {
      .slide-nav, .progress-bar { display: none !important; }
      body { background: white; }
      .slides-container { display: block; overflow: visible; }
      .slide { position: relative !important; opacity: 1 !important; transform: none !important; pointer-events: auto; width: 100%; height: auto; aspect-ratio: 16/9; page-break-after: always; }
      @page { size: 1920px 1080px; margin: 0; }
    }
  </style>
</head>
<body>
  <nav class="slide-nav">
    <span class="slide-counter"><span id="current">1</span> / <span id="total">1</span></span>
    <button onclick="prevSlide()" aria-label="Previous">&#8249;</button>
    <button onclick="nextSlide()" aria-label="Next">&#8250;</button>
    <button onclick="toggleFullscreen()" aria-label="Fullscreen">&#x26F6;</button>
  </nav>
  <div class="progress-bar"><div class="progress-bar__fill" id="progress"></div></div>

  <div class="slides-container">

    <section class="slide active" id="slide-1">
      <header class="slide-header">
        <div class="slide-header__left">
          <span class="section-badge">5</span>
          <h1 class="slide-title">導入前チェックリスト</h1>
        </div>
      </header>

      <div class="checklist-grid">
        <div class="checklist-item checklist-item--done">
          <div class="checklist-check checklist-check--done">
            <svg viewBox="0 0 18 18" fill="none"><path d="M4 9l3.5 3.5L14 5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div>
            <div class="checklist-content__title">要件定義の完了</div>
            <div class="checklist-content__desc">導入目的・KPI・対象範囲を明文化済み</div>
          </div>
        </div>

        <div class="checklist-item checklist-item--done">
          <div class="checklist-check checklist-check--done">
            <svg viewBox="0 0 18 18" fill="none"><path d="M4 9l3.5 3.5L14 5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div>
            <div class="checklist-content__title">ステークホルダーの合意</div>
            <div class="checklist-content__desc">経営層・現場リーダーの承認を取得済み</div>
          </div>
        </div>

        <div class="checklist-item checklist-item--done">
          <div class="checklist-check checklist-check--done">
            <svg viewBox="0 0 18 18" fill="none"><path d="M4 9l3.5 3.5L14 5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div>
            <div class="checklist-content__title">データ品質の確認</div>
            <div class="checklist-content__desc">移行対象データのクレンジングが完了</div>
          </div>
        </div>

        <div class="checklist-item checklist-item--done">
          <div class="checklist-check checklist-check--done">
            <svg viewBox="0 0 18 18" fill="none"><path d="M4 9l3.5 3.5L14 5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div>
            <div class="checklist-content__title">インフラ環境の準備</div>
            <div class="checklist-content__desc">クラウド環境・ネットワーク設定が完了</div>
          </div>
        </div>

        <div class="checklist-item">
          <div class="checklist-check checklist-check--todo"></div>
          <div>
            <div class="checklist-content__title">研修プランの策定</div>
            <div class="checklist-content__desc">エンドユーザー向けトレーニング計画を作成</div>
          </div>
        </div>

        <div class="checklist-item">
          <div class="checklist-check checklist-check--todo"></div>
          <div>
            <div class="checklist-content__title">運用体制の確立</div>
            <div class="checklist-content__desc">障害対応フロー・エスカレーション先を決定</div>
          </div>
        </div>
      </div>

      <div class="checklist-summary">
        <svg viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" fill="var(--color-primary)" opacity="0.15"/>
          <path d="M14 20l4 4 8-8" stroke="var(--color-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="checklist-summary__text"><strong>進捗：4/6項目完了</strong> — 残り2項目を完了次第、来月からのパイロット運用を開始します。</div>
      </div>

      <footer class="slide-footer">
        <div class="slide-footer__notes"><p>1. チェックリストは2025年3月19日時点の状況</p></div>
        <div class="slide-footer__page">12</div>
      </footer>
    </section>

  </div>

  <script>
    (function() {
      var slides = document.querySelectorAll('.slide'), total = slides.length, current = 0;
      var currentEl = document.getElementById('current'), totalEl = document.getElementById('total'), progressEl = document.getElementById('progress');
      if (totalEl) totalEl.textContent = total;
      function goTo(i) { if (i<0||i>=total) return; slides[current].classList.remove('active'); current=i; slides[current].classList.add('active'); if (currentEl) currentEl.textContent=current+1; if (progressEl) progressEl.style.width=((current+1)/total*100)+'%'; }
      function next() { goTo(current+1); } function prev() { goTo(current-1); }
      document.addEventListener('keydown', function(e) { switch(e.key) { case 'ArrowRight': case ' ': e.preventDefault(); next(); break; case 'ArrowLeft': e.preventDefault(); prev(); break; } });
      function updateScale() { var s=Math.min(innerWidth/1920,innerHeight/1080),ox=(innerWidth-1920*s)/2,oy=(innerHeight-1080*s)/2; slides.forEach(function(sl){sl.style.transform='translate('+ox+'px,'+oy+'px) scale('+s+')';}); }
      window.addEventListener('load', function() { updateScale(); }); window.addEventListener('resize', updateScale);
      window.prevSlide=prev; window.nextSlide=next; window.toggleFullscreen=function(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();};
    })();
  </script>
</body>
</html>
