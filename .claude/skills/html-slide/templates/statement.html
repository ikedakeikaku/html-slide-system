<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statement Template</title>
  <style>
    :root {
      --color-primary: #0652DD;
      --color-primary-light: #E8EEFF;
      --color-primary-dark: #003BB5;
      --color-accent: #FF4757;
      --color-accent-light: #FFE8EA;
      --color-bg: #FFFFFF;
      --color-bg-subtle: #F8F9FA;
      --color-text: #1A1A1A;
      --color-text-muted: #6B7280;
      --color-border: #E5E7EB;
      --font-heading: "Noto Sans JP", "Helvetica Neue", Arial, system-ui, sans-serif;
      --font-body: "Noto Sans JP", "Helvetica Neue", Arial, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
      --slide-width: 1920px;
      --slide-height: 1080px;
      --slide-padding: 120px;
      --slide-padding-top: 100px;
      --space-xs: 8px;
      --space-sm: 16px;
      --space-md: 24px;
      --space-lg: 40px;
      --space-xl: 64px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-pill: 999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow: hidden; width: 100%; height: 100%; background: #000; }

    .slides-container { width: 100vw; height: 100vh; overflow: hidden; position: relative; }

    .slide {
      width: var(--slide-width); height: var(--slide-height);
      padding: var(--slide-padding-top) var(--slide-padding) var(--slide-padding);
      position: absolute; top: 0; left: 0;
      background: var(--color-bg);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      transform-origin: top left;
      overflow: hidden;
      font-family: var(--font-body); color: var(--color-text);
    }
    .slide.active { opacity: 1; pointer-events: auto; z-index: 1; }

    /* ===== Statement Layout ===== */
    .statement-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      position: relative;
    }

    .statement-accent {
      width: 80px;
      height: 5px;
      background: var(--color-primary);
      border-radius: 3px;
      margin-bottom: 48px;
    }

    .statement-main {
      font-family: var(--font-heading);
      font-size: 80px;
      font-weight: 800;
      line-height: 1.3;
      color: var(--color-text);
      max-width: 1400px;
      margin-bottom: 40px;
    }

    .statement-sub {
      font-size: 24px;
      color: var(--color-text-muted);
      line-height: 1.6;
      max-width: 900px;
    }

    .statement-deco {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--color-primary-light) 0%, transparent 70%);
      opacity: 0.5;
      pointer-events: none;
    }

    /* ===== Footer ===== */
    .slide-footer {
      position: absolute; bottom: 36px;
      left: var(--slide-padding); right: var(--slide-padding);
      display: flex; justify-content: space-between; align-items: flex-end;
    }
    .slide-footer__notes { font-size: 11px; color: var(--color-text-muted); max-width: 80%; line-height: 1.5; }
    .slide-footer__page { font-size: 14px; color: var(--color-text-muted); }

    /* ===== Navigation ===== */
    .slide-nav {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; align-items: center; gap: 8px; z-index: 100;
      background: rgba(0,0,0,0.6); padding: 8px 16px;
      border-radius: var(--radius-pill); opacity: 0; transition: opacity 0.3s;
    }
    .slide-nav:hover { opacity: 1; }
    .slide-nav button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 4px 8px; }
    .slide-nav button:hover { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .slide-counter { color: white; font-size: 14px; font-family: var(--font-mono); }
    .progress-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(0,0,0,0.1); z-index: 100; }
    .progress-bar__fill { height: 100%; background: var(--color-primary); transition: width 0.3s ease; width: 0%; }

    @media print {
      .slide-nav, .progress-bar { display: none !important; }
      body { background: white; }
      .slides-container { display: block; overflow: visible; }
      .slide { position: relative !important; opacity: 1 !important; transform: none !important; pointer-events: auto; width: 100%; height: auto; aspect-ratio: 16 / 9; page-break-after: always; }
      @page { size: 1920px 1080px; margin: 0; }
    }
  </style>
</head>
<body>
  <nav class="slide-nav">
    <span class="slide-counter"><span id="current">1</span> / <span id="total">1</span></span>
    <button onclick="prevSlide()" aria-label="Previous">&#8249;</button>
    <button onclick="nextSlide()" aria-label="Next">&#8250;</button>
    <button onclick="toggleFullscreen()" aria-label="Fullscreen">&#x26F6;</button>
  </nav>
  <div class="progress-bar"><div class="progress-bar__fill" id="progress"></div></div>

  <div class="slides-container">

    <section class="slide active" id="slide-1">
      <div class="statement-layout">
        <svg class="statement-deco" width="600" height="600" viewBox="0 0 600 600" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.15;pointer-events:none;">
          <circle cx="300" cy="300" r="280" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-dasharray="8 12"/>
          <circle cx="300" cy="300" r="200" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-dasharray="4 8"/>
        </svg>
        <div class="statement-accent"></div>
        <h1 class="statement-main">テクノロジーで、<br>すべての人の可能性を広げる</h1>
        <p class="statement-sub">私たちのミッションは、誰もが自由に価値を生み出し、<br>つながることができる世界を実現することです。</p>
      </div>
      <footer class="slide-footer">
        <div class="slide-footer__notes"><p>1. 2025年5月 中期経営計画より</p></div>
        <div class="slide-footer__page">5</div>
      </footer>
    </section>

  </div>

  <script>
    (function() {
      var slides = document.querySelectorAll('.slide');
      var total = slides.length, current = 0;
      var currentEl = document.getElementById('current');
      var totalEl = document.getElementById('total');
      var progressEl = document.getElementById('progress');
      if (totalEl) totalEl.textContent = total;
      function goTo(i) { if (i<0||i>=total) return; slides[current].classList.remove('active'); current=i; slides[current].classList.add('active'); if (currentEl) currentEl.textContent=current+1; if (progressEl) progressEl.style.width=((current+1)/total*100)+'%'; }
      function next() { goTo(current+1); } function prev() { goTo(current-1); }
      document.addEventListener('keydown', function(e) { switch(e.key) { case 'ArrowRight': case ' ': e.preventDefault(); next(); break; case 'ArrowLeft': e.preventDefault(); prev(); break; } });
      function updateScale() { var s=Math.min(innerWidth/1920,innerHeight/1080),ox=(innerWidth-1920*s)/2,oy=(innerHeight-1080*s)/2; slides.forEach(function(sl){sl.style.transform='translate('+ox+'px,'+oy+'px) scale('+s+')';}); }
      window.addEventListener('load', function() { updateScale(); }); window.addEventListener('resize', updateScale);
      window.prevSlide=prev; window.nextSlide=next; window.toggleFullscreen=function(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();};
    })();
  </script>
</body>
</html>
