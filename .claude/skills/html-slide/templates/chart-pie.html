<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart Pie Template</title>
  <style>
    :root {
      --color-primary: #0652DD;
      --color-primary-light: #E8EEFF;
      --color-primary-dark: #003BB5;
      --color-accent: #FF4757;
      --color-accent-light: #FFE8EA;
      --color-bg: #FFFFFF;
      --color-bg-subtle: #F8F9FA;
      --color-text: #1A1A1A;
      --color-text-muted: #6B7280;
      --color-border: #E5E7EB;
      --font-heading: "Noto Sans JP", "Helvetica Neue", Arial, system-ui, sans-serif;
      --font-body: "Noto Sans JP", "Helvetica Neue", Arial, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
      --slide-width: 1920px;
      --slide-height: 1080px;
      --slide-padding: 120px;
      --slide-padding-top: 100px;
      --space-xs: 8px;
      --space-sm: 16px;
      --space-md: 24px;
      --space-lg: 40px;
      --space-xl: 64px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-pill: 999px;
      --chart-1: #B0C4FF;
      --chart-2: #6B9AFF;
      --chart-3: #0652DD;
      --chart-4: #003BB5;
      --chart-accent: #FF4757;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow: hidden; width: 100%; height: 100%; background: #000; }

    .slides-container {
      width: 100vw; height: 100vh; overflow: hidden; position: relative;
    }

    .slide {
      width: var(--slide-width);
      height: var(--slide-height);
      padding: var(--slide-padding-top) var(--slide-padding) var(--slide-padding);
      position: absolute; top: 0; left: 0;
      background: var(--color-bg);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      transform-origin: top left;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--color-text);
    }
    .slide.active { opacity: 1; pointer-events: auto; z-index: 1; }

    /* ===== Header ===== */
    .slide-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: var(--space-lg);
    }
    .slide-header__left { display: flex; align-items: center; gap: var(--space-sm); }
    .section-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; background: var(--color-primary);
      color: white; font-weight: 700; font-size: 20px;
      border-radius: var(--radius-sm); flex-shrink: 0;
    }
    .slide-title {
      font-family: var(--font-heading); font-size: 36px; font-weight: 800;
      color: var(--color-text); line-height: 1.3;
    }

    /* ===== Doughnut Chart Layout ===== */
    .doughnut-layout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-xl);
      height: 560px;
    }

    .doughnut-chart-wrap {
      position: relative;
      width: 500px;
      height: 500px;
      flex-shrink: 0;
    }

    .doughnut-chart-wrap canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .doughnut-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }

    .doughnut-center__value {
      font-size: 56px;
      font-weight: 800;
      color: var(--color-text);
      line-height: 1.1;
    }

    .doughnut-center__label {
      font-size: 18px;
      color: var(--color-text-muted);
      margin-top: 4px;
    }

    .doughnut-legend {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .doughnut-legend__item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: 16px 24px;
      background: var(--color-bg-subtle);
      border-radius: var(--radius-md);
      min-width: 320px;
    }

    .doughnut-legend__color {
      width: 16px;
      height: 16px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }

    .doughnut-legend__text {
      flex: 1;
    }

    .doughnut-legend__name {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text);
    }

    .doughnut-legend__detail {
      font-size: 14px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }

    .doughnut-legend__percent {
      font-size: 28px;
      font-weight: 800;
      color: var(--color-text);
      margin-left: auto;
      padding-left: 16px;
    }

    /* ===== Footer ===== */
    .slide-footer {
      position: absolute; bottom: 36px;
      left: var(--slide-padding); right: var(--slide-padding);
      display: flex; justify-content: space-between; align-items: flex-end;
    }
    .slide-footer__notes { font-size: 11px; color: var(--color-text-muted); max-width: 80%; line-height: 1.5; }
    .slide-footer__page { font-size: 14px; color: var(--color-text-muted); }

    /* ===== Navigation ===== */
    .slide-nav {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; align-items: center; gap: 8px; z-index: 100;
      background: rgba(0,0,0,0.6); padding: 8px 16px;
      border-radius: var(--radius-pill); opacity: 0; transition: opacity 0.3s;
    }
    .slide-nav:hover { opacity: 1; }
    .slide-nav button {
      background: none; border: none; color: white;
      font-size: 20px; cursor: pointer; padding: 4px 8px;
    }
    .slide-nav button:hover { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .slide-counter { color: white; font-size: 14px; font-family: var(--font-mono); }

    .progress-bar {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 4px;
      background: rgba(0,0,0,0.1); z-index: 100;
    }
    .progress-bar__fill { height: 100%; background: var(--color-primary); transition: width 0.3s ease; width: 0%; }

    @media print {
      .slide-nav, .progress-bar { display: none !important; }
      body { background: white; }
      .slides-container { display: block; overflow: visible; }
      .slide {
        position: relative !important; opacity: 1 !important;
        transform: none !important; pointer-events: auto;
        width: 100%; height: auto; aspect-ratio: 16 / 9; page-break-after: always;
      }
      @page { size: 1920px 1080px; margin: 0; }
    }
  </style>
</head>
<body>
  <nav class="slide-nav">
    <span class="slide-counter"><span id="current">1</span> / <span id="total">1</span></span>
    <button onclick="prevSlide()" aria-label="Previous">&#8249;</button>
    <button onclick="nextSlide()" aria-label="Next">&#8250;</button>
    <button onclick="toggleFullscreen()" aria-label="Fullscreen">&#x26F6;</button>
  </nav>
  <div class="progress-bar"><div class="progress-bar__fill" id="progress"></div></div>

  <div class="slides-container">

    <!-- ===== SLIDE: Doughnut Chart ===== -->
    <section class="slide active" id="slide-1">

      <header class="slide-header">
        <div class="slide-header__left">
          <span class="section-badge">1</span>
          <h1 class="slide-title">セグメント別売上構成比</h1>
        </div>
      </header>

      <div class="doughnut-layout">

        <div class="doughnut-chart-wrap">
          <canvas id="chart-doughnut"></canvas>
          <div class="doughnut-center">
            <div class="doughnut-center__value">2,044</div>
            <div class="doughnut-center__label">億円（合計）</div>
          </div>
        </div>

        <div class="doughnut-legend">
          <div class="doughnut-legend__item">
            <div class="doughnut-legend__color" style="background: #B0C4FF;"></div>
            <div class="doughnut-legend__text">
              <div class="doughnut-legend__name">マーケットプレイス</div>
              <div class="doughnut-legend__detail">820億円</div>
            </div>
            <div class="doughnut-legend__percent">40%</div>
          </div>
          <div class="doughnut-legend__item">
            <div class="doughnut-legend__color" style="background: #6B9AFF;"></div>
            <div class="doughnut-legend__text">
              <div class="doughnut-legend__name">フィンテック</div>
              <div class="doughnut-legend__detail">572億円</div>
            </div>
            <div class="doughnut-legend__percent">28%</div>
          </div>
          <div class="doughnut-legend__item">
            <div class="doughnut-legend__color" style="background: #0652DD;"></div>
            <div class="doughnut-legend__text">
              <div class="doughnut-legend__name">US事業</div>
              <div class="doughnut-legend__detail">409億円</div>
            </div>
            <div class="doughnut-legend__percent">20%</div>
          </div>
          <div class="doughnut-legend__item">
            <div class="doughnut-legend__color" style="background: #003BB5;"></div>
            <div class="doughnut-legend__text">
              <div class="doughnut-legend__name">新規・その他</div>
              <div class="doughnut-legend__detail">143億円</div>
            </div>
            <div class="doughnut-legend__percent">7%</div>
          </div>
          <div class="doughnut-legend__item">
            <div class="doughnut-legend__color" style="background: #FF4757;"></div>
            <div class="doughnut-legend__text">
              <div class="doughnut-legend__name">SaaS</div>
              <div class="doughnut-legend__detail">100億円</div>
            </div>
            <div class="doughnut-legend__percent">5%</div>
          </div>
        </div>

      </div>

      <footer class="slide-footer">
        <div class="slide-footer__notes">
          <p>1. FY2026 1Q実績ベース。セグメント間取引消去前の数値。</p>
        </div>
        <div class="slide-footer__page">7</div>
      </footer>

    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <script>
    Chart.register(ChartDataLabels);

    new Chart(document.getElementById('chart-doughnut'), {
      type: 'doughnut',
      data: {
        labels: ['マーケットプレイス', 'フィンテック', 'US事業', '新規・その他', 'SaaS'],
        datasets: [{
          data: [820, 572, 409, 143, 100],
          backgroundColor: ['#B0C4FF', '#6B9AFF', '#0652DD', '#003BB5', '#FF4757'],
          borderWidth: 3,
          borderColor: '#FFFFFF'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '50%',
        plugins: {
          legend: { display: false },
          datalabels: {
            color: '#fff',
            font: { size: 16, weight: 'bold', family: 'system-ui' },
            formatter: function(value, ctx) {
              var total = ctx.dataset.data.reduce(function(a, b) { return a + b; }, 0);
              var pct = Math.round(value / total * 100);
              return pct >= 10 ? pct + '%' : '';
            }
          }
        }
      }
    });
  </script>

  <script>
    /* ===== Navigation ===== */
    (function() {
      var slides = document.querySelectorAll('.slide');
      var total = slides.length;
      var current = 0;
      var currentEl = document.getElementById('current');
      var totalEl = document.getElementById('total');
      var progressEl = document.getElementById('progress');
      if (totalEl) totalEl.textContent = total;

      function goTo(index) {
        if (index < 0 || index >= total) return;
        slides[current].classList.remove('active');
        current = index;
        slides[current].classList.add('active');
        if (currentEl) currentEl.textContent = current + 1;
        if (progressEl) progressEl.style.width = ((current + 1) / total * 100) + '%';
        history.replaceState(null, '', '#' + (current + 1));
      }
      function next() { goTo(current + 1); }
      function prev() { goTo(current - 1); }

      document.addEventListener('keydown', function(e) {
        switch(e.key) {
          case 'ArrowRight': case 'ArrowDown': case ' ': case 'PageDown':
            e.preventDefault(); next(); break;
          case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
            e.preventDefault(); prev(); break;
          case 'Home': goTo(0); break;
          case 'End': goTo(total - 1); break;
        }
      });

      var touchStartX = 0;
      document.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; });
      document.addEventListener('touchend', function(e) {
        var diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 50) { diff > 0 ? next() : prev(); }
      });

      var wheelCooldown = false;
      document.addEventListener('wheel', function(e) {
        if (wheelCooldown) return;
        wheelCooldown = true;
        setTimeout(function() { wheelCooldown = false; }, 500);
        e.deltaY > 0 ? next() : prev();
      });

      function updateScale() {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var scale = Math.min(vw / 1920, vh / 1080);
        var offsetX = (vw - 1920 * scale) / 2;
        var offsetY = (vh - 1080 * scale) / 2;
        slides.forEach(function(s) {
          s.style.transform = 'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + scale + ')';
        });
      }

      window.addEventListener('load', function() {
        var hash = parseInt(location.hash.slice(1));
        goTo(isNaN(hash) ? 0 : hash - 1);
        updateScale();
      });
      window.addEventListener('resize', updateScale);
      window.prevSlide = prev;
      window.nextSlide = next;
      window.toggleFullscreen = function() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      };
    })();
  </script>
</body>
</html>
